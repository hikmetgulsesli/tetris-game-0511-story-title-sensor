<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Tetris Main Menu</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700;800&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "tertiary-fixed": "#e7e2d9",
                      "secondary-container": "#3c4a5e",
                      "surface-container-low": "#1c1b1b",
                      "secondary": "#b9c7e0",
                      "on-secondary": "#233144",
                      "on-background": "#e5e2e1",
                      "error-container": "#93000a",
                      "on-primary": "#2d3133",
                      "on-surface-variant": "#c4c7c9",
                      "on-tertiary": "#32302a",
                      "secondary-fixed": "#d5e3fd",
                      "on-primary-container": "#626567",
                      "tertiary-fixed-dim": "#cbc6bd",
                      "inverse-primary": "#5c5f61",
                      "surface-tint": "#c4c7c9",
                      "primary-fixed-dim": "#c4c7c9",
                      "on-error": "#690005",
                      "inverse-surface": "#e5e2e1",
                      "on-secondary-fixed": "#0d1c2f",
                      "surface-bright": "#3a3939",
                      "on-surface": "#e5e2e1",
                      "primary": "#ffffff",
                      "inverse-on-surface": "#313030",
                      "primary-container": "#e0e3e5",
                      "on-error-container": "#ffdad6",
                      "surface-container": "#201f1f",
                      "on-primary-fixed": "#191c1e",
                      "surface-dim": "#131313",
                      "surface-container-highest": "#353535",
                      "surface": "#131313",
                      "surface-variant": "#353535",
                      "surface-container-high": "#2a2a2a",
                      "surface-container-lowest": "#0e0e0e",
                      "outline-variant": "#444749",
                      "on-secondary-fixed-variant": "#3a485c",
                      "tertiary": "#ffffff",
                      "secondary-fixed-dim": "#b9c7e0",
                      "error": "#ffb4ab",
                      "tertiary-container": "#e7e2d9",
                      "on-tertiary-fixed": "#1d1b16",
                      "background": "#131313",
                      "on-tertiary-container": "#67645d",
                      "on-secondary-container": "#abb9d2",
                      "primary-fixed": "#e0e3e5",
                      "outline": "#8e9193",
                      "on-tertiary-fixed-variant": "#494640",
                      "on-primary-fixed-variant": "#444749"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "container-padding": "24px",
                      "grid-block": "32px",
                      "unit": "4px",
                      "gutter": "16px",
                      "touch-target": "44px"
              },
              "fontFamily": {
                      "headline-lg": [
                              "Hanken Grotesk"
                      ],
                      "body-md": [
                              "Hanken Grotesk"
                      ],
                      "display-lg": [
                              "Hanken Grotesk"
                      ],
                      "label-sm": [
                              "JetBrains Mono"
                      ],
                      "body-lg": [
                              "Hanken Grotesk"
                      ],
                      "label-md": [
                              "JetBrains Mono"
                      ],
                      "headline-md": [
                              "Hanken Grotesk"
                      ]
              },
              "fontSize": {
                      "headline-lg": [
                              "32px",
                              {
                                      "lineHeight": "1.2",
                                      "fontWeight": "700"
                              }
                      ],
                      "body-md": [
                              "16px",
                              {
                                      "lineHeight": "1.5",
                                      "fontWeight": "400"
                              }
                      ],
                      "display-lg": [
                              "48px",
                              {
                                      "lineHeight": "1.1",
                                      "letterSpacing": "-0.02em",
                                      "fontWeight": "800"
                              }
                      ],
                      "label-sm": [
                              "12px",
                              {
                                      "lineHeight": "1.0",
                                      "fontWeight": "500"
                              }
                      ],
                      "body-lg": [
                              "18px",
                              {
                                      "lineHeight": "1.5",
                                      "fontWeight": "400"
                              }
                      ],
                      "label-md": [
                              "14px",
                              {
                                      "lineHeight": "1.0",
                                      "letterSpacing": "0.05em",
                                      "fontWeight": "500"
                              }
                      ],
                      "headline-md": [
                              "24px",
                              {
                                      "lineHeight": "1.3",
                                      "fontWeight": "600"
                              }
                      ]
              }
            }
          }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.filled {
            font-variation-settings: 'FILL' 1;
        }
        
        /* Focus styles for keyboard navigation */
        button:focus-visible {
            outline: 2px solid #F8FAFC;
            outline-offset: 2px;
        }

        /* Subtle grid background */
        .bg-grid {
            background-size: 32px 32px;
            background-image: 
                linear-gradient(to right, rgba(51, 65, 85, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(51, 65, 85, 0.05) 1px, transparent 1px);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-x-hidden relative">
<!-- Top App Bar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-gutter h-touch-target bg-surface/95 backdrop-blur-sm border-b border-outline-variant dark:border-outline-variant">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary">grid_view</span>
<span class="text-headline-md font-headline-md font-bold tracking-tighter text-primary uppercase">TETRIS.IO</span>
</div>
<div class="flex items-center gap-4">
<button class="text-on-surface-variant hover:text-primary hover:bg-surface-container-highest transition-colors duration-200 p-2 rounded-full active:scale-95 transition-transform duration-100 flex items-center justify-center h-touch-target w-touch-target">
<span class="material-symbols-outlined">help_outline</span>
</button>
<button class="text-on-surface-variant hover:text-primary hover:bg-surface-container-highest transition-colors duration-200 p-2 rounded-full active:scale-95 transition-transform duration-100 flex items-center justify-center h-touch-target w-touch-target">
<span class="material-symbols-outlined">settings</span>
</button>
</div>
</header>
<!-- Main Canvas -->
<main class="flex-grow flex flex-col items-center justify-center pt-20 pb-20 relative bg-grid w-full max-w-[1200px] mx-auto px-container-padding">
<!-- Decorative Tetromino Elements (Background) -->
<div class="absolute inset-0 pointer-events-none opacity-20 hidden md:block">
<!-- Simulated falling pieces using absolute positioning and simple shapes -->
<div class="absolute top-[20%] left-[10%] text-primary/30">
<div class="w-8 h-8 border border-outline-variant bg-surface-container shadow-[inset_0_0_8px_rgba(255,255,255,0.1)]"></div>
<div class="w-8 h-8 border border-outline-variant bg-surface-container shadow-[inset_0_0_8px_rgba(255,255,255,0.1)]"></div>
<div class="w-8 h-8 border border-outline-variant bg-surface-container shadow-[inset_0_0_8px_rgba(255,255,255,0.1)]"></div>
<div class="w-8 h-8 border border-outline-variant bg-surface-container shadow-[inset_0_0_8px_rgba(255,255,255,0.1)]"></div>
</div>
<div class="absolute top-[50%] right-[15%] text-primary/30 flex">
<div>
<div class="w-8 h-8 border border-outline-variant bg-surface-container shadow-[inset_0_0_8px_rgba(255,255,255,0.1)]"></div>
<div class="w-8 h-8 border border-outline-variant bg-surface-container shadow-[inset_0_0_8px_rgba(255,255,255,0.1)]"></div>
</div>
<div>
<div class="w-8 h-8 border border-outline-variant bg-surface-container shadow-[inset_0_0_8px_rgba(255,255,255,0.1)] mt-8"></div>
<div class="w-8 h-8 border border-outline-variant bg-surface-container shadow-[inset_0_0_8px_rgba(255,255,255,0.1)]"></div>
</div>
</div>
<div class="absolute bottom-[20%] left-[25%] text-primary/30 flex flex-col">
<div class="flex">
<div class="w-8 h-8 border border-outline-variant bg-surface-container shadow-[inset_0_0_8px_rgba(255,255,255,0.1)]"></div>
<div class="w-8 h-8 border border-outline-variant bg-surface-container shadow-[inset_0_0_8px_rgba(255,255,255,0.1)]"></div>
</div>
<div class="flex">
<div class="w-8 h-8 border border-outline-variant bg-surface-container shadow-[inset_0_0_8px_rgba(255,255,255,0.1)]"></div>
<div class="w-8 h-8 border border-outline-variant bg-surface-container shadow-[inset_0_0_8px_rgba(255,255,255,0.1)]"></div>
</div>
</div>
</div>
<!-- Logo Container -->
<div class="text-center mb-12 relative z-10">
<h1 class="text-[72px] md:text-[96px] font-display-lg text-primary tracking-tighter leading-none mb-4 drop-shadow-[0_0_15px_rgba(255,255,255,0.2)] uppercase">
                TETRIS
            </h1>
<p class="text-label-md font-label-md text-on-surface-variant uppercase tracking-widest">
                High Performance Core
            </p>
</div>
<!-- Action Menu -->
<div class="w-full max-w-[400px] flex flex-col gap-4 relative z-10">
<!-- Resume (Primary Action) -->
<button class="group relative flex items-center justify-center w-full h-touch-target bg-primary text-on-primary font-label-md text-label-md uppercase tracking-wider overflow-hidden hover:bg-opacity-90 transition-all duration-200">
<div class="absolute inset-0 border border-primary/20 pointer-events-none group-hover:border-primary/50 transition-colors"></div>
<div class="absolute inset-y-0 left-0 w-1 bg-surface-container-highest group-hover:w-2 transition-all"></div>
<span class="relative z-10 flex items-center gap-2">
<span class="material-symbols-outlined filled text-[18px]">play_arrow</span>
                    Resume Game
                </span>
</button>
<!-- Start New Game -->
<button class="group relative flex items-center justify-center w-full h-touch-target bg-surface-container border border-outline-variant text-on-surface font-label-md text-label-md uppercase tracking-wider hover:bg-surface-container-high hover:border-outline transition-all duration-200">
<span class="relative z-10 flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">add</span>
                    New Game
                </span>
</button>
<!-- Leaderboard / Ranks -->
<button class="group relative flex items-center justify-center w-full h-touch-target bg-surface-container border border-outline-variant text-on-surface font-label-md text-label-md uppercase tracking-wider hover:bg-surface-container-high hover:border-outline transition-all duration-200">
<span class="relative z-10 flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">leaderboard</span>
                    Ranks
                </span>
</button>
<!-- Controls -->
<button class="group relative flex items-center justify-center w-full h-touch-target bg-surface-container border border-outline-variant text-on-surface font-label-md text-label-md uppercase tracking-wider hover:bg-surface-container-high hover:border-outline transition-all duration-200">
<span class="relative z-10 flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">keyboard</span>
                    Controls
                </span>
</button>
</div>
<!-- System Stats / Footer Info -->
<div class="absolute bottom-24 w-full flex justify-between px-container-padding text-label-sm font-label-sm text-on-surface-variant/50 uppercase">
<span>v2.4.1 [Stable]</span>
<span>Ping: 12ms</span>
</div>
</main>
<!-- Bottom Navigation Bar (Mobile Only) -->
<nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-[56px] bg-surface dark:bg-surface border-t border-outline-variant dark:border-outline-variant">
<a class="flex flex-col items-center justify-center text-on-primary bg-primary rounded-none w-full h-full border-t-2 border-primary" href="#">
<span class="material-symbols-outlined">sports_esports</span>
<span class="text-label-sm font-label-sm mt-1">Battle</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant w-full h-full hover:bg-surface-container-high transition-colors duration-200" href="#">
<span class="material-symbols-outlined">leaderboard</span>
<span class="text-label-sm font-label-sm mt-1">Ranks</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant w-full h-full hover:bg-surface-container-high transition-colors duration-200" href="#">
<span class="material-symbols-outlined">keyboard</span>
<span class="text-label-sm font-label-sm mt-1">Controls</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant w-full h-full hover:bg-surface-container-high transition-colors duration-200" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-label-sm font-label-sm mt-1">Account</span>
</a>
</nav>
</body></html>
