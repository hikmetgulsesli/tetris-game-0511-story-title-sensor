<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Tetris.io - Battle</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700;800&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed": "#e7e2d9",
                        "secondary-container": "#3c4a5e",
                        "surface-container-low": "#1c1b1b",
                        "secondary": "#b9c7e0",
                        "on-secondary": "#233144",
                        "on-background": "#e5e2e1",
                        "error-container": "#93000a",
                        "on-primary": "#2d3133",
                        "on-surface-variant": "#c4c7c9",
                        "on-tertiary": "#32302a",
                        "secondary-fixed": "#d5e3fd",
                        "on-primary-container": "#626567",
                        "tertiary-fixed-dim": "#cbc6bd",
                        "inverse-primary": "#5c5f61",
                        "surface-tint": "#c4c7c9",
                        "primary-fixed-dim": "#c4c7c9",
                        "on-error": "#690005",
                        "inverse-surface": "#e5e2e1",
                        "on-secondary-fixed": "#0d1c2f",
                        "surface-bright": "#3a3939",
                        "on-surface": "#e5e2e1",
                        "primary": "#ffffff",
                        "inverse-on-surface": "#313030",
                        "primary-container": "#e0e3e5",
                        "on-error-container": "#ffdad6",
                        "surface-container": "#201f1f",
                        "on-primary-fixed": "#191c1e",
                        "surface-dim": "#131313",
                        "surface-container-highest": "#353535",
                        "surface": "#131313",
                        "surface-variant": "#353535",
                        "surface-container-high": "#2a2a2a",
                        "surface-container-lowest": "#0e0e0e",
                        "outline-variant": "#444749",
                        "on-secondary-fixed-variant": "#3a485c",
                        "tertiary": "#ffffff",
                        "secondary-fixed-dim": "#b9c7e0",
                        "error": "#ffb4ab",
                        "tertiary-container": "#e7e2d9",
                        "on-tertiary-fixed": "#1d1b16",
                        "background": "#131313",
                        "on-tertiary-container": "#67645d",
                        "on-secondary-container": "#abb9d2",
                        "primary-fixed": "#e0e3e5",
                        "outline": "#8e9193",
                        "on-tertiary-fixed-variant": "#494640",
                        "on-primary-fixed-variant": "#444749"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container-padding": "24px",
                        "grid-block": "32px",
                        "unit": "4px",
                        "gutter": "16px",
                        "touch-target": "44px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Hanken Grotesk"],
                        "body-md": ["Hanken Grotesk"],
                        "display-lg": ["Hanken Grotesk"],
                        "label-sm": ["JetBrains Mono"],
                        "body-lg": ["Hanken Grotesk"],
                        "label-md": ["JetBrains Mono"],
                        "headline-md": ["Hanken Grotesk"]
                    },
                    "fontSize": {
                        "headline-lg": ["32px", { "lineHeight": "1.2", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "display-lg": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                        "label-sm": ["12px", { "lineHeight": "1.0", "fontWeight": "500" }],
                        "body-lg": ["18px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "label-md": ["14px", { "lineHeight": "1.0", "letterSpacing": "0.05em", "fontWeight": "500" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        .tetris-grid-bg {
            background-image: 
                linear-gradient(to right, rgba(51, 65, 85, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(51, 65, 85, 0.05) 1px, transparent 1px);
            background-size: var(--spacing-grid-block) var(--spacing-grid-block);
        }
        
        .tetromino-t {
            background-color: #A855F7; /* Purple */
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.5), 0 0 8px rgba(168, 85, 247, 0.3);
        }
        .tetromino-i {
            background-color: #38BDF8; /* Cyan */
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.5), 0 0 8px rgba(56, 189, 248, 0.3);
        }
        .tetromino-o {
            background-color: #FACC15; /* Yellow */
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.5), 0 0 8px rgba(250, 204, 21, 0.3);
        }
        .tetromino-s {
            background-color: #4ADE80; /* Green */
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.5), 0 0 8px rgba(74, 222, 128, 0.3);
        }
        .tetromino-z {
            background-color: #F87171; /* Red */
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.5), 0 0 8px rgba(248, 113, 113, 0.3);
        }
        .tetromino-j {
            background-color: #60A5FA; /* Blue */
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.5), 0 0 8px rgba(96, 165, 250, 0.3);
        }
        .tetromino-l {
            background-color: #FB923C; /* Orange */
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.5), 0 0 8px rgba(251, 146, 60, 0.3);
        }
        
        .ghost-piece {
            border: 1px solid rgba(255,255,255,0.2);
            background-color: transparent;
            box-shadow: none;
        }

        /* 44px Minimum Touch Target Utilities */
        .min-touch {
            min-height: var(--spacing-touch-target);
            min-width: var(--spacing-touch-target);
        }
    </style>
</head>
<body class="bg-background text-on-background antialiased min-h-screen flex flex-col pt-[var(--spacing-touch-target)] pb-[56px] md:pb-0">
<!-- TopAppBar (Hidden md to show on mobile, or adjusted for desktop) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-gutter h-touch-target bg-surface/95 backdrop-blur-sm border-b border-outline-variant dark:border-outline-variant flat no shadows md:hidden">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary dark:text-primary">grid_view</span>
<span class="text-headline-md font-headline-md font-bold tracking-tighter text-primary dark:text-primary uppercase">TETRIS.IO</span>
</div>
<div class="flex items-center gap-2 text-on-surface-variant dark:text-on-surface-variant">
<button class="min-touch flex items-center justify-center hover:text-primary hover:bg-surface-container-highest transition-colors duration-200 rounded-full active:scale-95 transition-transform duration-100">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">help_outline</span>
</button>
<button class="min-touch flex items-center justify-center hover:text-primary hover:bg-surface-container-highest transition-colors duration-200 rounded-full active:scale-95 transition-transform duration-100">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">settings</span>
</button>
</div>
</header>
<!-- Main Game Container -->
<main class="flex-grow flex items-center justify-center p-gutter w-full max-w-[1200px] mx-auto">
<!-- Game Layout Wrapper (Responsive Bento-ish) -->
<div class="grid grid-cols-1 md:grid-cols-[auto_320px_auto] gap-gutter md:gap-[32px] w-full max-w-4xl mx-auto items-start justify-center">
<!-- Left Panel: Stats (Desktop) / Top (Mobile) -->
<div class="flex flex-row md:flex-col gap-unit md:gap-gutter w-full order-2 md:order-1 justify-between md:justify-start">
<!-- Score Card -->
<div class="bg-[#111827] border border-[#334155] border-t-2 border-t-primary rounded p-3 md:p-4 flex flex-col w-full">
<h2 class="text-label-sm font-label-sm text-on-surface-variant uppercase mb-1">Score</h2>
<div class="text-headline-md font-headline-md text-primary tracking-wider font-bold">0012450</div>
</div>
<!-- Level Card -->
<div class="bg-[#111827] border border-[#334155] border-t-2 border-t-secondary rounded p-3 md:p-4 flex flex-col w-full">
<h2 class="text-label-sm font-label-sm text-on-surface-variant uppercase mb-1">Level</h2>
<div class="text-headline-md font-headline-md text-secondary tracking-wider font-bold">04</div>
</div>
<!-- Lines Card -->
<div class="bg-[#111827] border border-[#334155] border-t-2 border-t-tertiary-fixed rounded p-3 md:p-4 flex flex-col w-full">
<h2 class="text-label-sm font-label-sm text-on-surface-variant uppercase mb-1">Lines</h2>
<div class="text-headline-md font-headline-md text-tertiary-fixed tracking-wider font-bold">042</div>
</div>
<!-- Hold Piece (Desktop mainly) -->
<div class="hidden md:flex bg-[#111827] border border-[#334155] rounded p-4 flex-col mt-4">
<h2 class="text-label-sm font-label-sm text-on-surface-variant uppercase mb-4 text-center">Hold</h2>
<div class="w-[128px] h-[128px] mx-auto flex items-center justify-center border border-[#334155]/50 bg-background/50 rounded">
<!-- Empty Hold state -->
<span class="text-on-surface-variant opacity-30 font-label-md text-label-md">EMPTY</span>
</div>
</div>
</div>
<!-- Center Panel: The Game Board -->
<div class="order-1 md:order-2 flex flex-col items-center justify-center focus-within:ring-2 focus-within:ring-primary focus-within:ring-offset-2 focus-within:ring-offset-background outline-none" tabindex="0">
<!-- Board Frame -->
<div class="bg-[#111827] p-2 rounded-lg border-2 border-[#334155] shadow-[0_0_20px_rgba(0,0,0,0.5)]">
<!-- The Grid (10x20) -->
<div class="w-[320px] h-[640px] bg-[#0F172A] tetris-grid-bg relative overflow-hidden border border-[#334155]/50">
<!-- Static Placed Blocks (Example: some garbage at bottom) -->
<div class="absolute bottom-0 left-[0px] w-[32px] h-[32px] tetromino-l"></div>
<div class="absolute bottom-0 left-[32px] w-[32px] h-[32px] tetromino-l"></div>
<div class="absolute bottom-0 left-[64px] w-[32px] h-[32px] tetromino-l"></div>
<div class="absolute bottom-[32px] left-[64px] w-[32px] h-[32px] tetromino-l"></div>
<div class="absolute bottom-0 left-[160px] w-[32px] h-[32px] tetromino-i"></div>
<div class="absolute bottom-0 left-[192px] w-[32px] h-[32px] tetromino-i"></div>
<div class="absolute bottom-0 left-[224px] w-[32px] h-[32px] tetromino-i"></div>
<div class="absolute bottom-0 left-[256px] w-[32px] h-[32px] tetromino-i"></div>
<div class="absolute bottom-[32px] left-[192px] w-[32px] h-[32px] tetromino-o"></div>
<div class="absolute bottom-[32px] left-[224px] w-[32px] h-[32px] tetromino-o"></div>
<div class="absolute bottom-[64px] left-[192px] w-[32px] h-[32px] tetromino-o"></div>
<div class="absolute bottom-[64px] left-[224px] w-[32px] h-[32px] tetromino-o"></div>
<!-- Active Piece (T-Shape mid-drop) -->
<!-- Position: X=3 (96px), Y=8 (256px from top) -->
<div class="absolute top-[256px] left-[96px] w-[96px] h-[64px]">
<!-- T shape: flat top, nub on bottom middle -->
<div class="absolute top-0 left-0 w-[32px] h-[32px] tetromino-t"></div>
<div class="absolute top-0 left-[32px] w-[32px] h-[32px] tetromino-t"></div>
<div class="absolute top-0 left-[64px] w-[32px] h-[32px] tetromino-t"></div>
<div class="absolute top-[32px] left-[32px] w-[32px] h-[32px] tetromino-t"></div>
</div>
<!-- Ghost Piece (T-Shape at bottom) -->
<!-- Predict landing at bottom above the 'I' piece gap -->
<div class="absolute bottom-[0px] left-[96px] w-[96px] h-[64px] opacity-40">
<div class="absolute top-0 left-0 w-[32px] h-[32px] ghost-piece"></div>
<div class="absolute top-0 left-[32px] w-[32px] h-[32px] ghost-piece"></div>
<div class="absolute top-0 left-[64px] w-[32px] h-[32px] ghost-piece"></div>
<div class="absolute top-[32px] left-[32px] w-[32px] h-[32px] ghost-piece"></div>
</div>
</div>
</div>
<!-- Mobile On-Screen Controls (Visible only on small screens) -->
<div class="w-full mt-6 grid grid-cols-5 gap-2 md:hidden">
<button class="bg-[#111827] border border-[#334155] text-on-surface flex items-center justify-center rounded min-touch active:bg-surface-variant">
<span class="material-symbols-outlined">arrow_left</span>
</button>
<button class="bg-[#111827] border border-[#334155] text-on-surface flex items-center justify-center rounded min-touch active:bg-surface-variant">
<span class="material-symbols-outlined">arrow_drop_down</span>
</button>
<button class="bg-[#111827] border border-[#334155] text-on-surface flex items-center justify-center rounded min-touch active:bg-surface-variant">
<span class="material-symbols-outlined">arrow_right</span>
</button>
<button class="bg-[#111827] border border-[#334155] text-on-surface flex items-center justify-center rounded min-touch active:bg-surface-variant">
<span class="material-symbols-outlined">rotate_right</span>
</button>
<button class="bg-primary text-on-primary border border-primary flex items-center justify-center rounded min-touch font-bold active:opacity-80">
<span class="material-symbols-outlined">keyboard_double_arrow_down</span>
</button>
</div>
</div>
<!-- Right Panel: Next Pieces & Actions -->
<div class="flex flex-col gap-4 w-full order-3 hidden md:flex">
<!-- Next Queue -->
<div class="bg-[#111827] border border-[#334155] rounded p-4 flex flex-col">
<h2 class="text-label-sm font-label-sm text-on-surface-variant uppercase mb-4 text-center">Next</h2>
<div class="flex flex-col gap-4 items-center">
<!-- Next 1 (Larger) -->
<div class="w-[96px] h-[96px] flex items-center justify-center border border-[#334155]/30 bg-background/30 rounded relative">
<!-- S piece -->
<div class="relative w-[96px] h-[64px] scale-75">
<div class="absolute top-[32px] left-0 w-[32px] h-[32px] tetromino-s"></div>
<div class="absolute top-[32px] left-[32px] w-[32px] h-[32px] tetromino-s"></div>
<div class="absolute top-0 left-[32px] w-[32px] h-[32px] tetromino-s"></div>
<div class="absolute top-0 left-[64px] w-[32px] h-[32px] tetromino-s"></div>
</div>
</div>
<!-- Next 2 -->
<div class="w-[64px] h-[64px] flex items-center justify-center border border-[#334155]/20 bg-background/20 rounded relative">
<!-- O piece -->
<div class="relative w-[64px] h-[64px] scale-[0.5]">
<div class="absolute top-0 left-0 w-[32px] h-[32px] tetromino-o"></div>
<div class="absolute top-0 left-[32px] w-[32px] h-[32px] tetromino-o"></div>
<div class="absolute top-[32px] left-0 w-[32px] h-[32px] tetromino-o"></div>
<div class="absolute top-[32px] left-[32px] w-[32px] h-[32px] tetromino-o"></div>
</div>
</div>
<!-- Next 3 -->
<div class="w-[64px] h-[64px] flex items-center justify-center border border-[#334155]/20 bg-background/20 rounded relative">
<!-- I piece -->
<div class="relative w-[128px] h-[32px] scale-[0.35]">
<div class="absolute top-0 left-0 w-[32px] h-[32px] tetromino-i"></div>
<div class="absolute top-0 left-[32px] w-[32px] h-[32px] tetromino-i"></div>
<div class="absolute top-0 left-[64px] w-[32px] h-[32px] tetromino-i"></div>
<div class="absolute top-0 left-[96px] w-[32px] h-[32px] tetromino-i"></div>
</div>
</div>
</div>
</div>
<!-- Status / Action -->
<div class="mt-auto flex flex-col gap-2">
<div class="bg-surface-container-low border border-outline-variant px-4 py-2 rounded text-center">
<span class="text-label-sm font-label-sm text-primary uppercase animate-pulse">Playing</span>
</div>
<button class="bg-[#111827] border border-[#334155] text-on-surface py-2 rounded min-touch hover:bg-surface-variant transition-colors text-label-md font-label-md uppercase tracking-wider">
                        Pause (Esc)
                    </button>
</div>
</div>
</div>
</main>
<!-- BottomNavBar (Mobile Only) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-[56px] bg-surface dark:bg-surface border-t border-outline-variant dark:border-outline-variant flat no shadows md:hidden">
<a class="flex flex-col items-center justify-center text-on-primary bg-primary rounded-none w-full h-full border-t-2 border-primary active:opacity-80 transition-opacity duration-100 group" href="#">
<span class="material-symbols-outlined text-[24px] mb-1 group-hover:bg-surface-container-high transition-colors duration-200" style="font-variation-settings: 'FILL' 1;">sports_esports</span>
<span class="text-label-sm font-label-sm">Battle</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant w-full h-full hover:bg-surface-container-high transition-colors duration-200 active:opacity-80 transition-opacity duration-100 group" href="#">
<span class="material-symbols-outlined text-[24px] mb-1" style="font-variation-settings: 'FILL' 0;">leaderboard</span>
<span class="text-label-sm font-label-sm">Ranks</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant w-full h-full hover:bg-surface-container-high transition-colors duration-200 active:opacity-80 transition-opacity duration-100 group" href="#">
<span class="material-symbols-outlined text-[24px] mb-1" style="font-variation-settings: 'FILL' 0;">keyboard</span>
<span class="text-label-sm font-label-sm">Controls</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant w-full h-full hover:bg-surface-container-high transition-colors duration-200 active:opacity-80 transition-opacity duration-100 group" href="#">
<span class="material-symbols-outlined text-[24px] mb-1" style="font-variation-settings: 'FILL' 0;">person</span>
<span class="text-label-sm font-label-sm">Account</span>
</a>
</nav>
</body></html>
