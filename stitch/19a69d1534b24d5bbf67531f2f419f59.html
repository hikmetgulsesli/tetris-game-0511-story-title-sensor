<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TETRIS.IO - Game Over</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700;800&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed": "#e7e2d9",
                        "secondary-container": "#3c4a5e",
                        "surface-container-low": "#1c1b1b",
                        "secondary": "#b9c7e0",
                        "on-secondary": "#233144",
                        "on-background": "#e5e2e1",
                        "error-container": "#93000a",
                        "on-primary": "#2d3133",
                        "on-surface-variant": "#c4c7c9",
                        "on-tertiary": "#32302a",
                        "secondary-fixed": "#d5e3fd",
                        "on-primary-container": "#626567",
                        "tertiary-fixed-dim": "#cbc6bd",
                        "inverse-primary": "#5c5f61",
                        "surface-tint": "#c4c7c9",
                        "primary-fixed-dim": "#c4c7c9",
                        "on-error": "#690005",
                        "inverse-surface": "#e5e2e1",
                        "on-secondary-fixed": "#0d1c2f",
                        "surface-bright": "#3a3939",
                        "on-surface": "#e5e2e1",
                        "primary": "#ffffff",
                        "inverse-on-surface": "#313030",
                        "primary-container": "#e0e3e5",
                        "on-error-container": "#ffdad6",
                        "surface-container": "#201f1f",
                        "on-primary-fixed": "#191c1e",
                        "surface-dim": "#131313",
                        "surface-container-highest": "#353535",
                        "surface": "#131313",
                        "surface-variant": "#353535",
                        "surface-container-high": "#2a2a2a",
                        "surface-container-lowest": "#0e0e0e",
                        "outline-variant": "#444749",
                        "on-secondary-fixed-variant": "#3a485c",
                        "tertiary": "#ffffff",
                        "secondary-fixed-dim": "#b9c7e0",
                        "error": "#ffb4ab",
                        "tertiary-container": "#e7e2d9",
                        "on-tertiary-fixed": "#1d1b16",
                        "background": "#131313",
                        "on-tertiary-container": "#67645d",
                        "on-secondary-container": "#abb9d2",
                        "primary-fixed": "#e0e3e5",
                        "outline": "#8e9193",
                        "on-tertiary-fixed-variant": "#494640",
                        "on-primary-fixed-variant": "#444749"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container-padding": "24px",
                        "grid-block": "32px",
                        "unit": "4px",
                        "gutter": "16px",
                        "touch-target": "44px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Hanken Grotesk"],
                        "body-md": ["Hanken Grotesk"],
                        "display-lg": ["Hanken Grotesk"],
                        "label-sm": ["JetBrains Mono"],
                        "body-lg": ["Hanken Grotesk"],
                        "label-md": ["JetBrains Mono"],
                        "headline-md": ["Hanken Grotesk"]
                    },
                    "fontSize": {
                        "headline-lg": ["32px", { "lineHeight": "1.2", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "display-lg": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                        "label-sm": ["12px", { "lineHeight": "1.0", "fontWeight": "500" }],
                        "body-lg": ["18px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "label-md": ["14px", { "lineHeight": "1.0", "letterSpacing": "0.05em", "fontWeight": "500" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        .grid-bg {
            background-image: 
                linear-gradient(to right, rgba(51, 65, 85, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(51, 65, 85, 0.05) 1px, transparent 1px);
            background-size: 32px 32px;
        }
        .neon-glow-red {
            text-shadow: 0 0 10px rgba(255, 180, 171, 0.5), 0 0 20px rgba(255, 180, 171, 0.3);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen grid-bg flex flex-col font-body-md antialiased selection:bg-primary selection:text-on-primary">
<!-- Top Navigation Omitted - Contextual Suppression (Linear/Transactional "Game Over" Screen) -->
<main class="flex-grow flex items-center justify-center p-gutter relative z-10">
<!-- Modal Overlay Background -->
<div class="absolute inset-0 bg-[#0F172A]/90 backdrop-blur-sm -z-10"></div>
<div class="w-full max-w-md">
<!-- Game Over Header -->
<div class="text-center mb-8">
<h1 class="text-display-lg font-display-lg text-error uppercase tracking-widest neon-glow-red mb-2">Game Over</h1>
<p class="text-body-lg font-body-lg text-on-surface-variant">Block out! No more space available.</p>
</div>
<!-- Stats Card (Level 1 Panel) -->
<div class="bg-[#111827] border border-[#334155] p-6 mb-8 shadow-2xl relative overflow-hidden group">
<!-- Subtle top accent -->
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-primary to-surface-variant"></div>
<div class="flex flex-col gap-6">
<!-- Final Score (Hero Stat) -->
<div class="text-center">
<h2 class="text-label-md font-label-md text-on-surface-variant uppercase tracking-widest mb-2">Final Score</h2>
<div class="text-display-lg font-display-lg text-primary">
                            1,245,890
                        </div>
</div>
<hr class="border-[#334155]"/>
<!-- Secondary Stats -->
<div class="grid grid-cols-2 gap-4">
<div class="bg-surface-container-low border border-surface-variant p-4 text-center">
<h3 class="text-label-sm font-label-sm text-on-surface-variant uppercase tracking-widest mb-2">Level Reached</h3>
<div class="text-headline-lg font-headline-lg text-primary">24</div>
</div>
<div class="bg-surface-container-low border border-surface-variant p-4 text-center">
<h3 class="text-label-sm font-label-sm text-on-surface-variant uppercase tracking-widest mb-2">Lines Cleared</h3>
<div class="text-headline-lg font-headline-lg text-primary">248</div>
</div>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col gap-4">
<!-- Primary Action -->
<button class="h-touch-target w-full bg-primary text-[#0F172A] flex items-center justify-center gap-2 hover:bg-opacity-90 active:scale-[0.98] transition-all focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-background group">
<span class="material-symbols-outlined" data-icon="replay" data-weight="fill" style="font-variation-settings: 'FILL' 1;">replay</span>
<span class="text-label-md font-label-md uppercase tracking-widest font-bold">Play Again</span>
</button>
<!-- Secondary Action -->
<button class="h-touch-target w-full bg-[#111827] border border-[#334155] text-on-surface flex items-center justify-center gap-2 hover:bg-surface-container-high active:scale-[0.98] transition-all focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-background">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
<span class="text-label-md font-label-md uppercase tracking-widest">Return to Menu</span>
</button>
</div>
<!-- Leaderboard Tease (Optional contextual element to encourage replay) -->
<div class="mt-8 text-center text-label-sm font-label-sm text-on-surface-variant flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[16px]" data-icon="emoji_events">emoji_events</span>
                New Personal Best! Top 5% globally.
            </div>
</div>
</main>
<!-- Bottom Navigation Omitted - Contextual Suppression (Linear/Transactional "Game Over" Screen) -->
</body></html>
